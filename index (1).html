<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="🛒 קניות">
<meta name="color-scheme" content="light">
<title>רשימת קניות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { color-scheme: light only; }
body { font-family: 'Heebo', sans-serif; direction: rtl; min-height: 100vh; background: #f5f4f1; padding-bottom: 60px; color: #1c1c1c; }
button { font-family: 'Heebo', sans-serif; cursor: pointer; }
input, select { font-family: 'Heebo', sans-serif; }
#app { max-width: 540px; margin: 0 auto; }
#loading { position: fixed; inset: 0; background: #f5f4f1; display: flex; align-items: center; justify-content: center; font-size: 40px; z-index: 999; }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1c1c1c; color: #fff; border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 600; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.25); white-space: nowrap; display: none; pointer-events: none; }
.screen { display: none; }
.screen.active { display: block; }

/* HOME */
.home-header { background: #1c1c1c; color: #fff; padding: 20px 20px 18px; }
.home-header h1 { font-size: 22px; font-weight: 900; }
.home-header p { font-size: 12px; opacity: 0.45; margin-top: 4px; }
.home-body { padding: 0 14px; }
.btn-new { width: 100%; margin-top: 16px; background: #1c1c1c; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; }
.empty-msg { text-align: center; color: #aaa; margin-top: 40px; font-size: 14px; }
.list-card { background: #fff; border-radius: 12px; padding: 13px 14px; margin-top: 10px; border: 1.5px solid #e8e8e8; }
.list-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.list-card-info { flex: 1; }
.list-card-name { font-weight: 800; font-size: 17px; }
.list-card-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.progress-bar { margin-top: 7px; background: #f0f0f0; border-radius: 99px; height: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; }
.btn-del { background: none; border: none; font-size: 16px; color: #ddd; padding: 0 0 0 8px; }
.list-card-btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn-shop { flex: 2; background: #1c1c1c; color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 700; min-width: 80px; }
.btn-edit { flex: 1; background: #f5f5f5; color: #444; border: none; border-radius: 8px; padding: 9px; font-size: 13px; min-width: 60px; }
.btn-clone { flex: 1; background: #f0f9ff; color: #0369a1; border: none; border-radius: 8px; padding: 9px; font-size: 13px; min-width: 60px; }

/* PILLS */
.pills { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; align-items: center; }
.pills::-webkit-scrollbar { display: none; }
.pill { flex-shrink: 0; width: 44px; height: 44px; border-radius: 50%; border: 2px solid; font-size: 22px; background: none; display: flex; align-items: center; justify-content: center; padding: 0; }
.pill.text { font-size: 12px; font-weight: 700; width: auto; padding: 0 12px; border-radius: 99px; }
.pill.active { border-color: #fff; background: #fff; color: #1c1c1c; }
.pill.inactive { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.9); }

/* BUILD */
.build-header { background: #1c1c1c; color: #fff; padding: 16px 16px 14px; position: sticky; top: 0; z-index: 50; }
.build-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.btn-back { background: none; border: none; color: #fff; font-size: 22px; padding: 0; flex-shrink: 0; }
.list-name-input { flex: 1; background: rgba(255,255,255,0.12); border: none; border-radius: 8px; padding: 8px 12px; color: #fff; font-size: 15px; font-weight: 700; outline: none; }
.list-name-input::placeholder { color: rgba(255,255,255,0.5); }
.btn-save { background: #22c55e; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 800; flex-shrink: 0; }
.build-body { padding: 10px 14px 0; }
.btn-custom-toggle { width: 100%; border: 1.5px solid #1c1c1c; border-radius: 9px; padding: 8px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.custom-form { background: #fff; border-radius: 12px; padding: 13px; margin-bottom: 10px; border: 2px solid #1c1c1c; }
.custom-name-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 9px 11px; font-size: 14px; outline: none; }
.custom-row { display: flex; gap: 7px; margin-top: 7px; align-items: center; }
.cat-select { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 10px; font-size: 12px; background: #fff; outline: none; }
.btn-add-custom { width: 100%; margin-top: 9px; background: #1c1c1c; color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; }
.cat-section { margin-bottom: 16px; }
.cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.cat-title { font-size: 15px; font-weight: 800; }
.cat-count { font-size: 11px; color: #aaa; background: #ebebeb; border-radius: 99px; padding: 2px 8px; }
.build-item { display: flex; align-items: center; gap: 10px; padding: 12px 13px; margin-bottom: 5px; border-radius: 10px; border: 1.5px solid #e8e8e8; background: #fff; }
.build-item.checked { background: #f0fdf4; border-color: #bbf7d0; }
.checkbox { width: 24px; height: 24px; border-radius: 5px; border: 2px solid #d1d5db; background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-size: 14px; cursor: pointer; }
.checkbox.checked { border-color: #22c55e; background: #22c55e; }
.item-name { flex: 1; font-size: 16px; font-weight: 500; color: #1c1c1c; user-select: none; cursor: pointer; }
.item-name.checked { color: #15803d; }
.item-name-input { flex: 1; border: 1.5px solid #1c1c1c; border-radius: 7px; padding: 4px 8px; font-size: 15px; outline: none; background: #fffbe6; }
.qty-control { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.qty-btn { width: 30px; height: 30px; border-radius: 6px; border: 1.5px solid #d1d5db; background: #fff; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #333; padding: 0; }
.qty-btn.green { border-color: #86efac; }
.qty-input { width: 40px; border: 1.5px solid #d1d5db; border-radius: 7px; padding: 3px 2px; font-size: 14px; outline: none; text-align: center; background: #fff; }
.qty-input.green { border-color: #86efac; }
.btn-del-item { background: none; border: none; font-size: 16px; color: #e5e7eb; padding: 0 2px; flex-shrink: 0; }
.btn-del-item:active { color: #ef4444; }
.cat-change-select { border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 11px; background: #fff; outline: none; padding: 2px 2px; max-width: 70px; }

/* SHOP */
.shop-header { background: #1c1c1c; color: #fff; padding: 16px 16px 0; position: sticky; top: 0; z-index: 50; }
.shop-header-top { display: flex; align-items: center; gap: 8px; }
.shop-title { flex: 1; min-width: 0; }
.shop-title h2 { font-size: 16px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.shop-title p { font-size: 11px; opacity: 0.45; margin-top: 1px; }
.btn-wa { background: #25d366; color: #fff; border: none; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 800; flex-shrink: 0; }
.btn-reset { background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; padding: 7px 8px; font-size: 12px; flex-shrink: 0; }
.btn-sort { background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; padding: 7px 8px; font-size: 12px; flex-shrink: 0; }
.btn-sort.active { background: #f59e0b; }
.shop-progress { margin: 10px 0 0; background: #333; border-radius: 99px; height: 5px; overflow: hidden; }
.shop-progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
.shop-pills { display: flex; gap: 8px; margin-top: 9px; padding-bottom: 12px; overflow-x: auto; scrollbar-width: none; align-items: center; }
.shop-pills::-webkit-scrollbar { display: none; }
.shop-body { padding: 12px 14px 0; }
.shop-item-wrap { margin-bottom: 6px; }
.shop-item { display: flex; align-items: center; gap: 10px; padding: 10px 13px; background: #fff; border-radius: 12px; border: 1.5px solid #e8e8e8; }
.shop-item.bought { background: #f7f7f7; border-color: #e0e0e0; }
.shop-item.has-note { border-radius: 12px 12px 0 0; border-bottom: none; }
.shop-item-name { flex: 1; font-size: 17px; font-weight: 600; color: #1c1c1c; user-select: none; text-align: right; }
.shop-item-name.bought { color: #bbb; text-decoration: line-through; }
.btn-note { background: none; border: none; font-size: 16px; color: #d1d5db; padding: 0 2px; line-height: 1; flex-shrink: 0; }
.btn-note.has-note { color: #f59e0b; }
.shop-check { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #d1d5db; background: transparent; flex-shrink: 0; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #fff; padding: 0; }
.shop-check.bought { border-color: #22c55e; background: #22c55e; }
.shop-qty-box { border: 1.5px dashed #bbb; border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 600; color: #444; min-width: 52px; text-align: center; background: #fafafa; cursor: pointer; flex-shrink: 0; }
.shop-qty-box.bought { border-color: #ccc; color: #bbb; }
.note-area { background: #fffdf0; border: 1.5px solid #fde68a; border-top: none; border-radius: 0 0 10px 10px; padding: 7px 11px; }
.note-text { font-size: 12px; color: #92400e; cursor: pointer; display: block; width: 100%; }
.note-input { width: 100%; border: none; background: transparent; font-size: 12px; outline: none; color: #92400e; font-family: 'Heebo', sans-serif; }
.all-done { position: fixed; bottom: 0; left: 0; right: 0; background: #22c55e; color: #fff; text-align: center; padding: 16px; font-size: 16px; font-weight: 900; z-index: 100; display: none; }
.shop-item-name.urgent { color: #dc2626; font-weight: 800; }
.shop-item.urgent-item { border-color: #fca5a5 !important; background: #fff7f7 !important; }
.urgent-banner { background: #dc2626; color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap:10px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; }

/* SHARE MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-width: 540px; }
.modal-title { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
.modal-url { background: #f5f5f5; border-radius: 8px; padding: 10px 12px; font-size: 13px; word-break: break-all; margin-bottom: 12px; color: #555; }
.modal-btns { display: flex; gap: 8px; }
.btn-copy { flex: 1; background: #1c1c1c; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; }
.btn-wa-share { flex: 1; background: #25d366; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; }
.btn-modal-close { width: 100%; margin-top: 10px; background: #f5f5f5; color: #444; border: none; border-radius: 8px; padding: 11px; font-size: 14px; }
</style>
</head>
<body>
<div id="loading">🛒</div>
<div id="app" style="display:none;">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-header">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h1>🛒 הרשימות שלי <span class="sync-dot"></span></h1>
        <div style="display:flex;gap:6px;">
          <button onclick="openHistory()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-family:Heebo,sans-serif;cursor:pointer;">📦</button>
          <button onclick="openStats()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-family:Heebo,sans-serif;cursor:pointer;">📊</button>
          <button onclick="togglePhoneSetup()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-family:Heebo,sans-serif;cursor:pointer;">⚙️</button>
        </div>
      </div>
      <p id="home-count">טוען...</p>
    </div>
    <div class="home-body">
      <button class="btn-new" onclick="openNew()">+ צרי רשימה חדשה</button>
      <div id="phone-setup" style="display:none;background:#fff;border-radius:12px;padding:13px 14px;margin-top:10px;border:1.5px solid #e8e8e8;">
        <div style="font-size:13px;font-weight:800;margin-bottom:8px;">📞 הגדרת מספר וואטסאפ לשליחת הודעות</div>
        <input id="partner-phone" placeholder="מספר טלפון (לדוגמה: 0521234567)" 
          style="width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 11px;font-size:14px;outline:none;font-family:Heebo,sans-serif;margin-bottom:8px;" />
        <button onclick="savePhone()" style="width:100%;background:#1c1c1c;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;">שמרי</button>
      </div>
      <div id="lists-container"></div>
    </div>
  </div>

  <!-- BUILD -->
  <div id="screen-build" class="screen">
    <div class="build-header">
      <div class="build-header-top">
        <button class="btn-back" onclick="goHome()">←</button>
        <input id="build-list-name" class="list-name-input" placeholder="שם הרשימה..." />
        <button class="btn-save" id="btn-save-list" onclick="handleSave()">שמרי (0)</button>
      </div>
      <div class="pills" id="build-pills"></div>
    </div>
    <div class="build-body">
      <div style="position:relative;margin-bottom:10px;">
        <input id="build-search" placeholder="🔍 חיפוש מוצר..." 
          oninput="renderBuildItems()" onkeyup="renderBuildItems()" onchange="renderBuildItems()"
          style="width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:Heebo,sans-serif;outline:none;background:#fff;" />
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <button id="btn-custom-toggle" class="btn-custom-toggle" onclick="toggleCustomForm()" style="flex:2;background:#fff;color:#1c1c1c;margin-bottom:0;">+ מוצר חדש</button>
        <button onclick="openNewCatModal()" style="flex:1;background:#6366f1;color:#fff;border:none;border-radius:9px;padding:8px;font-size:13px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;">+ קטגוריה</button>
      </div>
      <div id="custom-form" class="custom-form" style="display:none;">
        <input id="custom-name" class="custom-name-input" placeholder="שם המוצר..." onkeydown="if(event.key==='Enter')addCustomItem()" />
        <div class="custom-row">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeCustomQty(-1)">−</button>
            <input class="qty-input" id="custom-qty" value="1" />
            <button class="qty-btn" onclick="changeCustomQty(1)">+</button>
          </div>
          <select id="custom-cat" class="cat-select"></select>
        </div>
        <button class="btn-add-custom" onclick="addCustomItem()">הוסיפי מוצר</button>
      </div>
      <div id="build-items"></div>
    </div>
  </div>

  <!-- SHOP -->
  <div id="screen-shop" class="screen">
    <div class="shop-header">
      <div class="shop-header-top">
        <button class="btn-back" onclick="goHome()">←</button>
        <div class="shop-title">
          <h2 id="shop-title-name"></h2>
          <p id="shop-title-sub"></p>
        </div>
        <button class="btn-sort" id="btn-sort" onclick="toggleSort()" title="מיון">↕️</button>
        <button class="btn-sort" id="btn-urgent-sort" onclick="toggleUrgentSort()" title="דחופים">🔴</button>
        <button class="btn-sort" onclick="openAddToShop()" title="הוסיפי מוצר" style="background:rgba(255,255,255,0.1);">➕</button>
        <button class="btn-wa" onclick="shareWA()">📤</button>
        <button class="btn-wa" onclick="sendUrgentWA()" style="background:#dc2626;" title="שלחי דחופים">🔴📲</button>
        <button class="btn-wa" onclick="openShareModal()" style="background:#6366f1;">🔗</button>
        <button class="btn-reset" onclick="resetTrip()">🔄</button>
      </div>
      <div class="shop-progress"><div class="shop-progress-fill" id="shop-progress-fill"></div></div>
      <div class="shop-pills" id="shop-pills"></div>
    </div>
    <div id="urgent-banner" style="display:none;background:#dc2626;color:#fff;padding:12px 16px;align-items:center;justify-content:space-between;gap:10px;">
      <span id="urgent-banner-text" style="font-size:14px;font-weight:800;"></span>
      <button id="urgent-banner-btn" onclick="toggleUrgentFilter()" style="background:#fff;color:#dc2626;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:800;font-family:Heebo,sans-serif;cursor:pointer;">הצגי</button>
    </div>
    <div class="shop-body" id="shop-items"></div>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div class="build-header">
      <div class="build-header-top">
        <button class="btn-back" onclick="goHome()">←</button>
        <span style="flex:1;color:#fff;font-size:17px;font-weight:800;">📦 היסטוריית קניות</span>
      </div>
    </div>
    <div style="padding:16px 14px;" id="history-content"></div>
  </div>

  <!-- STATS -->
  <div id="screen-stats" class="screen">
    <div class="build-header">
      <div class="build-header-top">
        <button class="btn-back" onclick="goHome()">←</button>
        <span style="flex:1;color:#fff;font-size:17px;font-weight:800;">📊 סטטיסטיקה</span>
      </div>
    </div>
    <div style="padding:16px 14px;">
      <div id="stats-content"></div>
    </div>
  </div>

</div>

<!-- CAT CHANGE MODAL -->
<div class="modal-overlay" id="cat-modal" onclick="if(event.target===this)closeCatModal()">
  <div class="modal-box">
    <div class="modal-title" id="cat-modal-title">🔀 שנה קטגוריה</div>
    <div id="cat-modal-item-name" style="font-size:14px;color:#888;margin-bottom:12px;"></div>
    <div id="cat-modal-list" style="display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <input id="cat-modal-new" placeholder="+ קטגוריה חדשה (אמוג'י + שם)"
        style="flex:1;border:1.5px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13px;font-family:Heebo,sans-serif;outline:none;" />
      <button onclick="addCatFromModal()" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;font-family:Heebo,sans-serif;cursor:pointer;">הוסיפי</button>
    </div>
    <button class="btn-modal-close" onclick="closeCatModal()">סגרי</button>
  </div>
</div>

<!-- ADD TO SHOP MODAL -->
<div class="modal-overlay" id="add-shop-modal" onclick="if(event.target===this)closeAddToShop()">
  <div class="modal-box">
    <div class="modal-title">➕ הוסיפי מוצר לרשימה</div>
    <input id="add-shop-search" placeholder="🔍 חיפוש..." 
      style="width:100%;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:15px;font-family:Heebo,sans-serif;outline:none;margin-bottom:10px;" />
    <div id="add-shop-results" style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
    <button class="btn-modal-close" onclick="closeAddToShop()">סגרי</button>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="share-modal" onclick="if(event.target===this)closeShareModal()">
  <div class="modal-box">
    <div class="modal-title">🔗 שתפי רשימה לצפייה וסימון</div>
    <div class="modal-url" id="share-url-text"></div>
    <div class="modal-btns">
      <button class="btn-copy" onclick="copyShareUrl()">📋 העתיקי</button>
      <button class="btn-wa-share" onclick="sendShareWA()">📲 וואטסאפ</button>
    </div>
    <button class="btn-modal-close" onclick="closeShareModal()">סגרי</button>
  </div>
</div>

<div id="toast"></div>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  if (shopListener) { shopListener(); shopListener = null; }
  showScreen('home');
}
window.goHome = goHome;

async function saveLists() { await set(ref(db, 'lists'), lists); }
async function saveMaster() { await set(ref(db, 'masterList'), masterList); }

async function patchListItem(listId, idx, obj) {
  const updates = {};
  Object.keys(obj).forEach(k => { updates[`lists/${listId}/items/${idx}/${k}`] = obj[k]; });
  await update(ref(db), updates);
  Object.assign(lists[listId].items[idx], obj);
}

async function init() {
  try {
    const [lr, mr] = await Promise.all([get(ref(db,'lists')), get(ref(db,'masterList'))]);
    if (lr.exists()) lists = lr.val();
    if (mr.exists()) masterList = mr.val();
  } catch(e) { console.error(e); }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  onValue(ref(db,'lists'), snap => {
    lists = snap.exists() ? snap.val() : {};
    renderHome();
  });
  onValue(ref(db,'masterList'), snap => { if(snap.exists()) masterList = snap.val(); });
  renderHome();
}

// HOME
function renderHome() {
  const entries = Object.entries(lists).sort((a,b) => b[1].updatedAt - a[1].updatedAt);
  document.getElementById('home-count').textContent = entries.length + ' רשימות שמורות';
  const c = document.getElementById('lists-container');
  if (!entries.length) { c.innerHTML = '<p class="empty-msg">אין רשימות עדיין</p>'; return; }
  c.innerHTML = entries.map(([id, list]) => {
    const bought = list.items.filter(i => i.bought).length;
    const total = list.items.length;
    const pct = total ? Math.round(bought/total*100) : 0;
    const color = pct===100 ? '#22c55e' : '#f59e0b';
    return `<div class="list-card">
      <div class="list-card-top">
        <div class="list-card-info">
          <div class="list-card-name">${list.isTemplate?'⭐ ':''}${esc(list.name)}${(()=>{const u=list.items?list.items.filter(i=>i.urgent&&!i.bought).length:0;return u>0?` <span style="background:#dc2626;color:#fff;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:800;">${u} דחוף</span>`:'';})()}</div>
          <div class="list-card-sub">${total} פריטים · ${pct}% נרכשו</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <button class="btn-del" onclick="deleteList('${id}')">✕</button>
      </div>
      <div class="list-card-btns">
        <button class="btn-shop" onclick="openShop('${id}')">🛍️ קנייה</button>
        <button class="btn-edit" onclick="openEdit('${id}')">✏️ ערכי</button>
        <button class="btn-clone" onclick="cloneList('${id}')" title="שכפלי">📋</button>
        <button onclick="toggleTemplate('${id}')" title="${list.isTemplate?'הסירי מתבניות':'סמני כתבנית'}" style="flex:none;background:${list.isTemplate?'#fef3c7':'#f5f5f5'};border:none;border-radius:8px;padding:9px 10px;font-size:15px;cursor:pointer;">${list.isTemplate?'⭐':'☆'}</button>
      </div>
    </div>`;
  }).join('');
}

window.deleteList = async function(id) {
  if (!confirm('למחוק את הרשימה?')) return;
  await remove(ref(db,'lists/'+id));
  showToast('🗑️ נמחקה');
};

window.cloneList = async function(id) {
  const orig = lists[id];
  if (!orig) return;
  const newId = uid();
  const cloned = { ...orig, name: orig.name + ' (עותק)', updatedAt: Date.now(), items: orig.items.map(i => ({...i, bought: false})) };
  lists[newId] = cloned;
  await saveLists();
  showToast('📋 שוכפלה!');
};

// BUILD
window.openNew = function() { activeId = uid(); initBuild(null); };
window.openEdit = function(id) { activeId = id; initBuild(lists[id]); };

function initBuild(existing) {
  document.getElementById('build-list-name').value = existing?.name || '';
  buildActiveCat = null;
  buildSelected = {};
  masterList.forEach(m => { buildSelected[m.name] = { checked: false, qty: '1' }; });
  if (existing) existing.items.forEach(i => { if (buildSelected[i.name] !== undefined) buildSelected[i.name] = { checked: true, qty: i.qty, urgent: i.urgent||false }; });

  document.getElementById('custom-form').style.display = 'none';
  document.getElementById('btn-custom-toggle').style.background = '#fff';
  document.getElementById('btn-custom-toggle').style.color = '#1c1c1c';
  document.getElementById('btn-custom-toggle').textContent = '+ מוצר חדש לרשימה הקבועה';
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-qty').value = '1';

  const cats = allCats();
  document.getElementById('custom-cat').innerHTML = cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');

  renderBuildPills();
  renderBuildItems();
  showScreen('build');
  // Attach search listener after DOM ready
  setTimeout(() => {
    const s = document.getElementById('build-search');
    if (s) {
      s.value = '';
      s.addEventListener('input', () => renderBuildItems());
      s.addEventListener('keyup', () => renderBuildItems());
    }
  }, 100);
}

  // Get first emoji char properly
  function firstEmoji(str) {
    const m = str.match(/^(\p{Emoji})/u);
    return m ? m[1] : str.slice(0,2);
  }
  document.getElementById('build-pills').innerHTML =
    `<button class="pill text ${!buildActiveCat?'active':'inactive'}" onclick="setBuildCat(null)">הכל</button>` +
    cats.map(c => `<button class="pill ${buildActiveCat===c?'active':'inactive'}" title="${esc(c)}" onclick="setBuildCat('${esc(c)}')">${firstEmoji(c)}</button>`).join('');
}

window.setBuildCat = function(cat) { buildActiveCat = cat; renderBuildPills(); renderBuildItems(); };

function renderBuildItems() {
  const searchEl = document.getElementById('build-search');
  const searchTerm = (searchEl && searchEl.value ? searchEl.value : '').trim().toLowerCase();
  const cats = (buildActiveCat && !searchTerm) ? [buildActiveCat] : allCats();
  const selCount = masterList.filter(m => buildSelected[m.name]?.checked).length;
  document.getElementById('btn-save-list').textContent = `שמרי (${selCount})`;

  const container = document.getElementById('build-items');
  container.innerHTML = cats.map(cat => {
    let inCat = masterList.filter(m => m.cat === cat);
    if (searchTerm) inCat = inCat.filter(m => m.name.toLowerCase().includes(searchTerm) || m.cat.toLowerCase().includes(searchTerm));
    if (!inCat.length) return '';
    const checkedCount = inCat.filter(m => buildSelected[m.name]?.checked).length;
    return `<div class="cat-section">
      <div class="cat-header"><span class="cat-title">${esc(cat)}</span><span class="cat-count">${checkedCount}/${inCat.length}</span></div>
      ${inCat.map(m => renderBuildItem(m)).join('')}
    </div>`;
  }).join('');

  // Events
  container.querySelectorAll('.item-name[data-name]').forEach(el => {
    const name = el.getAttribute('data-name');
    el.addEventListener('mousedown', () => startPress(name, 'build'));
    el.addEventListener('mouseup', () => cancelPress(name));
    el.addEventListener('mouseleave', () => cancelPress(name));
    el.addEventListener('touchstart', () => startPress(name, 'build'), {passive:true});
    el.addEventListener('touchend', () => cancelPress(name));
    el.addEventListener('touchcancel', () => cancelPress(name));
    el.addEventListener('click', () => toggleBuildItem(name));
  });
  container.querySelectorAll('.checkbox[data-name]').forEach(el => {
    el.addEventListener('click', () => toggleBuildItem(el.getAttribute('data-name')));
  });
  container.querySelectorAll('.qty-btn[data-name]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.getAttribute('data-name');
      const delta = parseInt(el.getAttribute('data-delta'));
      const cur = parseFloat(buildSelected[name]?.qty) || 1;
      buildSelected[name].qty = String(Math.max(1, cur + delta));
      renderBuildItems();
    });
  });
  container.querySelectorAll('.qty-input[data-name]').forEach(el => {
    el.addEventListener('change', () => { buildSelected[el.getAttribute('data-name')].qty = el.value; });
  });
  // Urgent toggle in build
  container.querySelectorAll('.btn-urgent-build[data-name]').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.getAttribute('data-name');
      if (buildSelected[name]) {
        buildSelected[name].urgent = !buildSelected[name].urgent;
        renderBuildItems();
      }
    });
  });

  // Delete item from master
  container.querySelectorAll('.btn-del-item[data-name]').forEach(el => {
    el.addEventListener('click', async () => {
      const name = el.getAttribute('data-name');
      if (!confirm('למחוק "' + name + '" מהרשימה הקבועה?')) return;
      masterList = masterList.filter(m => m.name !== name);
      delete buildSelected[name];
      await saveMaster();
      renderBuildItems();
      showToast('🗑️ נמחק מהרשימה הקבועה');
    });
  });
  // Cat emoji button -> open cat change modal
  container.querySelectorAll('.cat-emoji-btn[data-name]').forEach(el => {
    el.addEventListener('click', () => openCatModal(el.getAttribute('data-name')));
  });
}

function renderBuildItem(m) {
  const s = buildSelected[m.name] || { checked: false, qty: '1' };
  const m2 = m.cat.match(/^(\p{Emoji})/u);
  const emoji = m2 ? m2[1] : m.cat.slice(0,2);
  const isUrgent = buildSelected[m.name]?.urgent || false;
  return `<div class="build-item ${s.checked?'checked':''}" style="${isUrgent?'border-color:#fca5a5;background:#fff7f7;':''}">
    <div class="checkbox ${s.checked?'checked':''}" data-name="${esc(m.name)}">${s.checked?'✓':''}</div>
    <span class="item-name ${s.checked?'checked':''}" data-name="${esc(m.name)}" style="${isUrgent?'color:#dc2626;font-weight:800;':''}">${isUrgent?'🔴 ':''}${esc(m.name)}</span>
    ${s.checked ? `<div class="qty-control">
      <button class="qty-btn green" data-name="${esc(m.name)}" data-delta="-1">−</button>
      <input class="qty-input green" data-name="${esc(m.name)}" value="${esc(s.qty)}" />
      <button class="qty-btn green" data-name="${esc(m.name)}" data-delta="1">+</button>
    </div>` : ''}
    <button class="btn-urgent-build" data-name="${esc(m.name)}" style="background:none;border:none;font-size:15px;cursor:pointer;padding:0;flex-shrink:0;opacity:${isUrgent?1:0.2};">🔴</button>
    <span class="cat-emoji-btn" data-name="${esc(m.name)}" title="שנה קטגוריה" style="font-size:18px;cursor:pointer;flex-shrink:0;">${emoji}</span>
    <button class="btn-del-item" data-name="${esc(m.name)}" title="מחקי">🗑</button>
  </div>`;
}

function toggleBuildItem(name) {
  if (!buildSelected[name]) buildSelected[name] = { checked: false, qty: '1' };
  buildSelected[name].checked = !buildSelected[name].checked;
  // Clear urgent when unchecking
  if (!buildSelected[name].checked) buildSelected[name].urgent = false;
  renderBuildItems();
}

function startPress(name, context) {
  pressTimers[name] = setTimeout(() => {
    if (context === 'build') startRenameBuild(name);
    else startRenameShop(name);
  }, 700);
}
function cancelPress(name) { clearTimeout(pressTimers[name]); }

function startRenameBuild(name) {
  const el = document.querySelector(`.item-name[data-name="${CSS.escape(name)}"]`);
  if (!el) return;
  const inp = document.createElement('input');
  inp.className = 'item-name-input';
  inp.value = name;
  el.replaceWith(inp);
  inp.focus(); inp.select();
  const commit = () => {
    const newName = inp.value.trim();
    if (newName && newName !== name) renameMasterItem(name, newName);
    else renderBuildItems();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
}

async function renameMasterItem(oldName, newName) {
  masterList = masterList.map(m => m.name === oldName ? {...m, name: newName} : m);
  if (buildSelected[oldName] !== undefined) { buildSelected[newName] = buildSelected[oldName]; delete buildSelected[oldName]; }
  Object.keys(lists).forEach(lid => { lists[lid].items = lists[lid].items.map(it => it.name === oldName ? {...it, name: newName} : it); });
  await Promise.all([saveMaster(), saveLists()]);
  showToast('✏️ שם עודכן בכל הרשימות');
  renderBuildItems();
}

window.toggleCustomForm = function() {
  const form = document.getElementById('custom-form');
  const btn = document.getElementById('btn-custom-toggle');
  const open = form.style.display === 'none';
  form.style.display = open ? 'block' : 'none';
  btn.style.background = open ? '#1c1c1c' : '#fff';
  btn.style.color = open ? '#fff' : '#1c1c1c';
  btn.textContent = open ? '✕ סגור' : '+ מוצר חדש לרשימה הקבועה';
  if (open) document.getElementById('custom-name').focus();
};

window.changeCustomQty = function(delta) {
  const inp = document.getElementById('custom-qty');
  inp.value = String(Math.max(1, (parseFloat(inp.value)||1) + delta));
};

window.addCustomItem = async function() {
  const name = document.getElementById('custom-name').value.trim();
  if (!name) return;
  const cat = document.getElementById('custom-cat').value;
  const qty = document.getElementById('custom-qty').value || '1';
  masterList.push({ name, cat });
  await saveMaster();
  buildSelected[name] = { checked: true, qty };
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-qty').value = '1';
  window.toggleCustomForm();
  renderBuildItems();
  showToast('✅ נוסף לרשימה הקבועה');
};

window.handleSave = async function() {
  const listName = document.getElementById('build-list-name').value.trim();
  if (!listName) { showToast('⚠️ תני שם לרשימה'); return; }
  const items = masterList.filter(m => buildSelected[m.name]?.checked).map(m => ({
    name: m.name, cat: m.cat, qty: buildSelected[m.name].qty, bought: false, note: '', urgent: buildSelected[m.name].urgent || false
  }));
  if (!items.length) { showToast('⚠️ לא סימנת פריטים'); return; }
  lists[activeId] = { name: listName, items, updatedAt: Date.now() };
  await saveLists();
  
  showToast('✅ נשמר!');
  goHome();

  // Send WA if there are urgent items - after goHome so window.open works
  const urgentItems = items.filter(i => i.urgent);
  if (urgentItems.length > 0) {
    const phone = localStorage.getItem('partner-phone') || '';
    const urgentList = urgentItems.map(i => '🔴 ' + i.name + (i.qty && i.qty !== '1' ? ' (' + i.qty + ')' : '')).join('\n');
    const appUrl = 'https://miri7112006-ux.github.io?list=' + activeId + '&urgent=1';
    const text = '🚨 *' + listName + ' - דחוף!*\n\n' + urgentList + '\n\n👉 פתח לראות: ' + appUrl;
    let waUrl;
    if (phone && phone.startsWith('https://chat.whatsapp.com/')) {
      // Group link - open group then user pastes message
      waUrl = phone;
      window.open(waUrl, '_blank');
      setTimeout(() => { navigator.clipboard.writeText(text).catch(()=>{}); showToast('📋 ההודעה הועתקה — הדביקי בקבוצה'); }, 1000);
    } else if (phone) {
      waUrl = 'https://wa.me/972' + phone.replace(/^0/, '').replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent(text);
      window.open(waUrl, '_blank');
    } else {
      waUrl = 'https://wa.me/?text=' + encodeURIComponent(text);
      window.open(waUrl, '_blank');
    }
  }
};

// SHOP
window.openShop = function(id) {
  activeId = id;
  shopActiveCat = null;
  shopSortBought = false;
  document.getElementById('btn-sort').classList.remove('active');

  if (shopListener) shopListener();
  shopListener = onValue(ref(db,'lists/'+id), snap => {
    if (snap.exists()) {
      lists[id] = snap.val();
      if (document.getElementById('screen-shop').classList.contains('active')) renderShop();
    }
  });
  renderShop();
  showScreen('shop');
};

function renderShop() {
  const list = lists[activeId];
  if (!list) return;
  const items = list.items;
  const bought = items.filter(i => i.bought).length;
  const total = items.length;
  const pct = total ? Math.round(bought/total*100) : 0;

  document.getElementById('shop-title-name').textContent = list.name;
  document.getElementById('shop-title-sub').textContent = `${bought}/${total} · ${pct}%`;
  const fill = document.getElementById('shop-progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct===100 ? '#22c55e' : '#f59e0b';
  document.getElementById('all-done').style.display = (pct===100 && total>0) ? 'block' : 'none';

  const cats = [...new Set(items.map(i => i.cat))];
  function firstEmoji(str) { const m = str.match(/^(\p{Emoji})/u); return m ? m[1] : str.slice(0,2); }
  document.getElementById('shop-pills').innerHTML =
    `<button class="pill text ${!shopActiveCat?'active':'inactive'}" onclick="setShopCat(null)">הכל</button>` +
    cats.map(c => `<button class="pill ${shopActiveCat===c?'active':'inactive'}" title="${esc(c)}" onclick="setShopCat('${esc(c)}')">${firstEmoji(c)}</button>`).join('');

  const displayCats = shopActiveCat ? [shopActiveCat] : cats;
  const body = document.getElementById('shop-items');

  // Update badge on every render
  updateBadge();

  if (shopSortUrgent) {
    // Show urgent items first across all cats
    const allIndexed = items.map((it,idx) => ({...it,idx}));
    const urgentItems = allIndexed.filter(i => i.urgent && !i.bought);
    const normalItems = allIndexed.filter(i => !i.urgent && !i.bought && (shopActiveCat ? i.cat===shopActiveCat : true));
    const boughtItems = allIndexed.filter(i => i.bought && (shopActiveCat ? i.cat===shopActiveCat : true));
    const urgentHtml = urgentItems.length ? '<div class="cat-section"><div class="cat-header"><span class="cat-title" style="color:#dc2626;">🔴 דחוף (' + urgentItems.length + ')</span></div>' + urgentItems.map(renderShopItem).join('') + '</div>' : '';
    const normalHtml = normalItems.length ? '<div class="cat-section"><div class="cat-header"><span class="cat-title">שאר הפריטים</span></div>' + normalItems.map(renderShopItem).join('') + '</div>' : '';
    const boughtHtml = boughtItems.length ? '<div class="cat-section" style="opacity:0.5"><div class="cat-header"><span class="cat-title">✓ נרכשו (' + boughtItems.length + ')</span></div>' + boughtItems.map(renderShopItem).join('') + '</div>' : '';
    body.innerHTML = urgentHtml + normalHtml + boughtHtml;
  } else if (shopSortBought) {
    // Mode: unbought by category, bought collapsed at bottom
    const unboughtHtml = displayCats.map(cat => {
      const catItems = items.map((it,idx) => ({...it,idx})).filter(it => it.cat===cat && !it.bought);
      if (!catItems.length) return '';
      return `<div class="cat-section">
        <div class="cat-header"><span class="cat-title">${esc(cat)}</span><span class="cat-count">${catItems.length}</span></div>
        ${catItems.map(item => renderShopItem(item)).join('')}
      </div>`;
    }).join('');

    const boughtItems = items.map((it,idx) => ({...it,idx})).filter(it => it.bought && (shopActiveCat ? it.cat===shopActiveCat : true));
    const boughtHtml = boughtItems.length ? `
      <div class="cat-section" style="opacity:0.5">
        <div class="cat-header"><span class="cat-title">✓ נרכשו (${boughtItems.length})</span></div>
        ${boughtItems.map(item => renderShopItem(item)).join('')}
      </div>` : '';

    body.innerHTML = unboughtHtml + boughtHtml;
  } else {
    body.innerHTML = displayCats.map(cat => {
      const catItems = items.map((it,idx) => ({...it,idx})).filter(it => it.cat===cat);
      if (!catItems.length) return '';
      const boughtInCat = catItems.filter(i => i.bought).length;
      return `<div class="cat-section">
        <div class="cat-header"><span class="cat-title">${esc(cat)}</span><span class="cat-count">${boughtInCat}/${catItems.length}</span></div>
        ${catItems.map(item => renderShopItem(item)).join('')}
      </div>`;
    }).join('');
  }

  // Events
  body.querySelectorAll('.shop-check[data-idx]').forEach(el => {
    el.addEventListener('click', () => toggleBought(parseInt(el.getAttribute('data-idx'))));
  });
  body.querySelectorAll('.shop-item-name[data-idx]').forEach(el => {
    const idx = parseInt(el.getAttribute('data-idx'));
    el.addEventListener('mousedown', () => startPress('shop-'+idx, 'shop'));
    el.addEventListener('mouseup', () => cancelPress('shop-'+idx));
    el.addEventListener('mouseleave', () => cancelPress('shop-'+idx));
    el.addEventListener('touchstart', () => startPress('shop-'+idx, 'shop'), {passive:true});
    el.addEventListener('touchend', () => cancelPress('shop-'+idx));
    el.addEventListener('touchcancel', () => cancelPress('shop-'+idx));
  });
  body.querySelectorAll('.btn-note[data-idx]').forEach(el => {
    el.addEventListener('click', () => toggleNote(parseInt(el.getAttribute('data-idx'))));
  });
  body.querySelectorAll('.note-text[data-idx]').forEach(el => {
    el.addEventListener('click', () => startEditNote(parseInt(el.getAttribute('data-idx'))));
  });
  body.querySelectorAll('.shop-qty-box[data-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.getAttribute('data-idx'));
      const item = lists[activeId].items[idx];
      const inp = document.createElement('input');
      inp.style.cssText = 'border:1.5px solid #1c1c1c;border-radius:8px;padding:4px 6px;font-size:13px;font-weight:600;width:60px;text-align:center;outline:none;font-family:Heebo,sans-serif;';
      inp.value = item.qty || '1';
      el.replaceWith(inp);
      inp.focus(); inp.select();
      inp.addEventListener('blur', async () => { await patchListItem(activeId, idx, { qty: inp.value || '1' }); });
      inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
    });
  });
  // Urgent toggle
  body.querySelectorAll('.btn-urgent-toggle[data-idx]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.getAttribute('data-idx'));
      const newVal = !lists[activeId].items[idx].urgent;
      await patchListItem(activeId, idx, { urgent: newVal });
      updateBadge();
    });
  });

  // Qty +/- buttons in shop - use event delegation on body
  body.onclick = null; // reset
  body.addEventListener('click', async function shopBodyClick(e) {
    const btn = e.target.closest('.shop-qty-btn');
    if (!btn) return;
    const idx = parseInt(btn.getAttribute('data-idx'));
    const delta = parseInt(btn.getAttribute('data-delta'));
    if (isNaN(idx) || isNaN(delta)) return;
    const cur = parseFloat(lists[activeId].items[idx].qty) || 1;
    const newQty = String(Math.max(1, cur + delta));
    await patchListItem(activeId, idx, { qty: newQty });
  }, { once: false });
  body.querySelectorAll('.shop-qty-inp[data-idx]').forEach(el => {
    el.addEventListener('change', async () => {
      const idx = parseInt(el.getAttribute('data-idx'));
      await patchListItem(activeId, idx, { qty: el.value || '1' });
    });
  });

  // WhatsApp per item
  body.querySelectorAll('.btn-wa-item[data-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.getAttribute('data-idx'));
      const item = lists[activeId].items[idx];
      const phone = localStorage.getItem('partner-phone') || '';
      const text = 'אין ' + item.name + ' (' + (item.qty||'1') + ') — מה לעשות? להביא משהו אחר?';
      let url;
      if (phone && phone.startsWith('https://chat.whatsapp.com/')) {
        url = phone;
        window.open(url, '_blank');
        setTimeout(() => { navigator.clipboard.writeText(text).catch(()=>{}); showToast('📋 הועתק — הדביקי בקבוצה'); }, 1000);
      } else if (phone) {
        url = 'https://wa.me/972' + phone.replace(/^0/,'').replace(/[^0-9]/g,'') + '?text=' + encodeURIComponent(text);
        window.open(url, '_blank');
      } else {
        url = 'https://wa.me/?text=' + encodeURIComponent(text);
        window.open(url, '_blank');
      }
    });
  });

  // Delete item from shop list
  body.querySelectorAll('.btn-del-shop[data-idx]').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.getAttribute('data-idx'));
      lists[activeId].items.splice(idx, 1);
      await set(ref(db,'lists/'+activeId+'/items'), lists[activeId].items);
      showToast('🗑️ נמחק מהרשימה');
    });
  });
}

function renderShopItem(item) {
  const hasNote = !!(item.note && item.note.trim());
  const qty = item.qty || '1';
  const urgentStyle = item.urgent ? 'border-color:#fca5a5!important;background:#fff7f7;' : '';
  return `<div class="shop-item-wrap">
    <div class="shop-item ${item.bought?'bought':''} ${hasNote?'has-note':''}" style="${urgentStyle}">
      <button class="shop-check ${item.bought?'bought':''}" data-idx="${item.idx}">${item.bought?'✓':''}</button>
      <div style="display:flex;align-items:center;gap:2px;flex-shrink:0;">
        <button style="width:24px;height:24px;border-radius:6px;border:1.5px solid ${item.bought?'#86efac':'#d1d5db'};background:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;font-family:Heebo,sans-serif;" data-idx="${item.idx}" data-delta="-1" class="shop-qty-btn">−</button>
        <input style="width:30px;border:1.5px solid ${item.bought?'#86efac':'#d1d5db'};border-radius:6px;padding:2px;font-size:12px;text-align:center;background:#fff;outline:none;font-family:Heebo,sans-serif;" data-idx="${item.idx}" class="shop-qty-inp" value="${esc(qty)}" />
        <button style="width:24px;height:24px;border-radius:6px;border:1.5px solid ${item.bought?'#86efac':'#d1d5db'};background:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;font-family:Heebo,sans-serif;" data-idx="${item.idx}" data-delta="1" class="shop-qty-btn">+</button>
      </div>
      <button class="btn-urgent-toggle" data-idx="${item.idx}" style="background:none;border:none;font-size:15px;cursor:pointer;padding:0;flex-shrink:0;opacity:${item.urgent?1:0.2};">🔴</button>
      <button class="btn-note ${hasNote?'has-note':''}" data-idx="${item.idx}">✏️</button>
      <span class="shop-item-name ${item.bought?'bought':''}" style="${item.urgent&&!item.bought?'color:#dc2626;font-weight:800;':''}" data-idx="${item.idx}" data-name="${esc(item.name)}">${item.urgent&&!item.bought?'🔴 ':''}${esc(item.name)}</span>
      <button class="btn-wa-item" data-idx="${item.idx}" style="background:none;border:none;font-size:15px;cursor:pointer;padding:0 2px;flex-shrink:0;color:#25d366;">💬</button>
      <button class="btn-del-shop" data-idx="${item.idx}" style="background:none;border:none;font-size:14px;color:#e5e7eb;padding:0 2px;flex-shrink:0;">🗑</button>
    </div>
    ${hasNote ? '<div class="note-area"><span class="note-text" data-idx="' + item.idx + '">' + esc(item.note) + '</span></div>' : ''}
  </div>`;
}

async function toggleBought(idx) {
  const newVal = !lists[activeId].items[idx].bought;
  await patchListItem(activeId, idx, { bought: newVal });
  // Check if all bought -> archive
  if (newVal) setTimeout(() => checkAndArchive(activeId), 500);
}

function toggleNote(idx) {
  const wrap = document.querySelector(`.btn-note[data-idx="${idx}"]`)?.closest('.shop-item-wrap');
  if (!wrap) return;
  let noteArea = wrap.querySelector('.note-area');
  if (noteArea) { startEditNote(idx); return; }
  const shopItem = wrap.querySelector('.shop-item');
  shopItem.classList.add('has-note');
  const div = document.createElement('div');
  div.className = 'note-area';
  div.innerHTML = `<input class="note-input" placeholder="הוסיפי הערה..." />`;
  wrap.appendChild(div);
  const inp = div.querySelector('input');
  inp.focus();
  inp.addEventListener('blur', async () => { await patchListItem(activeId, idx, { note: inp.value }); });
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); });
}

function startEditNote(idx) {

function renderStats() {
  const allLists = Object.values(lists);
  if (!allLists.length) {
    document.getElementById('stats-content').innerHTML = '<p style="text-align:center;color:#aaa;margin-top:40px;">אין נתונים עדיין</p>';
    return;
  }

  // Item frequency
  const freq = {};
  const catFreq = {};
  const monthlyCount = {};

  allLists.forEach(list => {
    // Monthly
    const d = new Date(list.updatedAt);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    monthlyCount[key] = (monthlyCount[key] || 0) + 1;

    list.items.forEach(item => {
      freq[item.name] = (freq[item.name] || 0) + 1;
      catFreq[item.cat] = (catFreq[item.cat] || 0) + 1;
    });
  });

  // Top 10 items
  const topItems = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,10);
  const maxFreq = topItems[0]?.[1] || 1;

  // Top cat
  const topCat = Object.entries(catFreq).sort((a,b) => b[1]-a[1])[0];

  // Monthly chart data - last 6 months
  const months = [];
  const now = new Date();
  for (let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = ['ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצ'][d.getMonth()];
    months.push({ key, label, count: monthlyCount[key] || 0 });
  }
  const maxMonth = Math.max(...months.map(m => m.count), 1);

  const totalItems = allLists.reduce((s,l) => s + l.items.length, 0);
  const avgItems = Math.round(totalItems / allLists.length);

  document.getElementById('stats-content').innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1.5px solid #e8e8e8;">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px;color:#888;">סיכום כללי</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div style="background:#f5f4f1;border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:24px;font-weight:900;">${allLists.length}</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">רשימות</div>
        </div>
        <div style="background:#f5f4f1;border-radius:10px;padding:12px;text-align:center;">
          <div style="font-size:24px;font-weight:900;">${avgItems}</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">פריטים ממוצע</div>
        </div>
      </div>
      ${topCat ? `<div style="margin-top:10px;background:#f0fdf4;border-radius:10px;padding:10px 12px;font-size:13px;">
        🏆 הקטגוריה הכי פופולרית: <strong>${esc(topCat[0])}</strong>
      </div>` : ''}
    </div>

    <div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1.5px solid #e8e8e8;">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px;color:#888;">קניות לפי חודש</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:80px;">
        ${months.map(m => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="font-size:10px;font-weight:700;color:#1c1c1c;">${m.count||''}</div>
            <div style="width:100%;background:${m.count?'#1c1c1c':'#e8e8e8'};border-radius:4px 4px 0 0;height:${m.count?Math.max(8,Math.round(m.count/maxMonth*60)):4}px;"></div>
            <div style="font-size:10px;color:#888;">${m.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <div style="background:#fff;border-radius:12px;padding:16px;border:1.5px solid #e8e8e8;">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px;color:#888;">המוצרים הכי נפוצים</div>
      ${topItems.map(([name, count], i) => `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="font-size:12px;color:#aaa;width:16px;text-align:center;">${i+1}</span>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;">${esc(name)}</div>
            <div style="margin-top:3px;background:#f0f0f0;border-radius:99px;height:4px;overflow:hidden;">
              <div style="height:100%;background:#1c1c1c;border-radius:99px;width:${Math.round(count/maxFreq*100)}%;"></div>
            </div>
          </div>
          <span style="font-size:13px;font-weight:700;color:#1c1c1c;flex-shrink:0;">${count}x</span>
        </div>`).join('')}
    </div>
  `;
}

// Auto-archive completed lists
async function checkAndArchive(id) {
  const list = lists[id];
  if (!list || list.isTemplate) return;
  const total = list.items.length;
  const bought = list.items.filter(i => i.bought).length;
  if (total > 0 && bought === total) {
    // Move to history
    if (!lists['__history__']) lists['__history__'] = {};
    if (typeof lists['__history__'] !== 'object') lists['__history__'] = {};
    const histEntry = { ...list, completedAt: Date.now() };
    const histId = 'h_' + Date.now();
    // Save to history node
    await set(ref(db, 'history/' + histId), histEntry);
    // Remove from active lists
    await remove(ref(db, 'lists/' + id));
    showToast('🎉 הועברה להיסטוריה!');
    goHome();
  }
}

window.deleteCat = function(cat) {
  const itemsInCat = masterList.filter(m => m.cat === cat);
  if (itemsInCat.length > 0) {
    if (!confirm('מחיקת הקטגוריה תמחק גם את ' + itemsInCat.length + ' המוצרים שבה. להמשיך?')) return;

  masterList = masterList.filter(m => m.cat !== cat);
  Object.keys(lists).forEach(lid => {
    lists[lid].items = lists[lid].items.filter(it => it.cat !== cat);
  });

// Badge API
function updateBadge() {
  if (!activeId || !lists[activeId]) { clearBadge(); return; }
  const urgentCount = lists[activeId].items.filter(i => i.urgent && !i.bought).length;
  if ('setAppBadge' in navigator) {
    if (urgentCount > 0) navigator.setAppBadge(urgentCount).catch(()=>{});
    else navigator.clearAppBadge().catch(()=>{});
  }
  // Also update via service worker
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'SET_BADGE', count: urgentCount });
  }
  // Update banner
  const banner = document.getElementById('urgent-banner');
  const bannerText = document.getElementById('urgent-banner-text');
  if (banner && bannerText) {
    if (urgentCount > 0 && document.getElementById('screen-shop').classList.contains('active')) {
      banner.style.display = 'flex';
      bannerText.textContent = '🔴 ' + urgentCount + ' מוצרים דחופים!';
    } else {
      banner.style.display = 'none';
    }
  }
}
function clearBadge() {
  if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(()=>{});
}

function renderAddShopResults(search) {
  const list = lists[activeId];
  const existingNames = new Set(list.items.map(i => i.name));
  const results = masterList.filter(m => {
    if (existingNames.has(m.name)) return false;
    if (!search) return true;
    return m.name.toLowerCase().includes(search);
  }).slice(0, 30);

  const container = document.getElementById('add-shop-results');
  if (!results.length) {
    container.innerHTML = '<p style="text-align:center;color:#aaa;font-size:14px;padding:10px;">לא נמצא</p>';
    return;
  }
  container.innerHTML = results.map(m => {
    const emoji = (m.cat.match(/^(\p{Emoji})/u) || [,''])[1];
    return '<button data-add-name="' + esc(m.name) + '" data-add-cat="' + esc(m.cat) + '" style="display:flex;align-items:center;gap:10px;background:#f5f5f5;border:none;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Heebo,sans-serif;cursor:pointer;text-align:right;width:100%;">' +
      '<span style="font-size:18px;">' + emoji + '</span>' +
      '<span style="flex:1;">' + esc(m.name) + '</span>' +
    '</button>';
  }).join('');
  
  // Event delegation
  container.onclick = async (e) => {
    const btn = e.target.closest('button[data-add-name]');
    if (!btn) return;
    const name = btn.getAttribute('data-add-name');
    const cat = btn.getAttribute('data-add-cat');
    const newItem = { name, cat, qty: '1', bought: false, note: '', urgent: false };
    lists[activeId].items.push(newItem);
    await set(ref(db, 'lists/' + activeId + '/items'), lists[activeId].items);
    closeAddToShop();
    showToast('✅ ' + name + ' נוסף');
  };
}



// Send urgent items via WA from shop
window.sendUrgentWA = function() {
  const list = lists[activeId];
  const urgentItems = list.items.filter(i => i.urgent && !i.bought);
  if (!urgentItems.length) { showToast('אין מוצרים דחופים שלא נקנו'); return; }
  const phone = localStorage.getItem('partner-phone') || '';
  const urgentList = urgentItems.map(i => '🔴 ' + i.name + (i.qty && i.qty !== '1' ? ' (' + i.qty + ')' : '')).join('\n');
  const appUrl = 'https://miri7112006-ux.github.io?list=' + activeId + '&urgent=1';
  const text = '🚨 *' + list.name + ' - דחוף!*\n\n' + urgentList + '\n\n👉 ' + appUrl;
  const waUrl = phone
    ? 'https://wa.me/972' + phone.replace(/^0/, '').replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent(text)
    : 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(waUrl, '_blank');
};

init().then(checkSharedList);
